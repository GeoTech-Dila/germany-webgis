<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body {
  margin: 0;
  display: flex;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* HEADER */
#header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #121222;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  color: white;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  width: 320px;
  margin-top: 60px;
  height: calc(100vh - 60px);
  background: #1e1e2f;
  padding: 15px;
  color: white;
  overflow: auto;
}

/* MAP */
#map {
  flex: 1;
  margin-top: 60px;
  height: calc(100vh - 60px);
}

/* TABS */
#tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.tab {
  flex: 1;
  padding: 8px;
  background: #2a2a40;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.tab.active {
  background: #00ffff;
  color: black;
}

/* LIST */
.item {
  padding: 10px;
  margin: 6px 0;
  background: #2a2a40;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.item.active {
  border: 1px solid #00ffff;
  background: #1e3a3a;
}

/* ANALYSIS BOX */
#analysisBox {
  background:#2a2a40;
  padding:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>Germany WebGIS Dashboard</div>
</div>

<div id="sidebar">

<div id="tabs">
  <button class="tab active" onclick="switchTab('layers')">Layers</button>
  <button class="tab" onclick="switchTab('analysis')">Analysis</button>
</div>

<div id="layersTab" class="tabContent">
  <div id="list"></div>
</div>

<div id="analysisTab" class="tabContent" style="display:none;">
  <h3>📊 Analysis</h3>
  <div id="analysisBox">
    <p>Bir eyalet seç...</p>
  </div>
</div>

</div>

<div id="map"></div>

<script>

// TAB SWITCH
function switchTab(tab){
  document.querySelectorAll(".tabContent").forEach(e=>e.style.display="none");
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));

  document.getElementById(tab+"Tab").style.display="block";
  event.target.classList.add("active");
}

// MAP
var map = L.map('map').setView([51, 10], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer;
let stateColors = {};
let layerMap = {};

// 🔥 örnek nüfus verisi
let populationData = {
  "Bayern": 13124737,
  "Berlin": 3669491,
  "Hessen": 6293154,
  "Hamburg": 1841179
};

// 🎯 ANALİZ FONKSİYONU
function updateAnalysis(feature){
  let name = feature.properties.name;
  let area = feature.properties.area_ha || 0;
  let pop = populationData[name];

  let density = pop && area ? (pop/area).toFixed(2) : null;

  document.getElementById("analysisBox").innerHTML = `
    <b>${name}</b><br><br>
    🌍 Alan: ${area.toLocaleString()} ha<br>
    👥 Nüfus: ${pop ? pop.toLocaleString() : "?"}<br>
    📊 Yoğunluk: ${density ? density + " kişi/ha" : "?"}
  `;
}

function getColor(name){
  const colors = ["#e41a1c","#377eb8","#4daf4a","#984ea3","#ff7f00","#ffff33"];
  return colors[name.charCodeAt(0)%colors.length];
}

function styleFeature(f){
  return {
    color:"#222",
    weight:1,
    fillColor: stateColors[f.properties.name] || getColor(f.properties.name),
    fillOpacity:0.7
  };
}

// DATA
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:styleFeature,
    onEachFeature:(f,l)=>{

      layerMap[f.properties.name] = l;

      l.bindPopup(`<b>${f.properties.name}</b><br>🌍 ${f.properties.area_ha?.toLocaleString() || "?"} ha`);

      l.on({
        mouseover:e=>e.target.setStyle({weight:3,color:"#00ffff"}),
        mouseout:e=>geoLayer.resetStyle(e.target),
        click:()=>updateAnalysis(f)
      });

    }
  }).addTo(map);

  let container = document.getElementById("list");

  data.features.forEach(f=>{

    let name = f.properties.name;
    stateColors[name]=getColor(name);

    let div = document.createElement("div");
    div.className="item";

    // 👁️
    let eye = document.createElement("span");
    eye.innerText="👁️";
    eye.style.cursor="pointer";

    let visible=true;

    eye.onclick=(e)=>{
      e.stopPropagation();
      let layer=layerMap[name];

      if(visible){
        map.removeLayer(layer);
        eye.innerText="🚫";
      }else{
        map.addLayer(layer);
        eye.innerText="👁️";
      }
      visible=!visible;
    };

    let label = document.createElement("span");
    label.innerText=name;

    label.onclick=()=>{
      document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));
      div.classList.add("active");

      let layer=layerMap[name];
      let b=layer.getBounds();

      map.fitBounds(b,{padding:[50,50]});
      map.panTo(b.getCenter());
      layer.openPopup();

      updateAnalysis(f);
    };

    let input=document.createElement("input");
    input.type="color";
    input.value=stateColors[name];

    input.onclick=e=>e.stopPropagation();
    input.oninput=e=>{
      stateColors[name]=e.target.value;
      geoLayer.setStyle(styleFeature);
    };

    let left=document.createElement("div");
    left.style.display="flex";
    left.style.gap="6px";

    left.appendChild(eye);
    left.appendChild(label);

    div.appendChild(left);
    div.appendChild(input);
    container.appendChild(div);

  });

  map.fitBounds(geoLayer.getBounds());

});
</script>

</body>
</html>
