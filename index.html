<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Germany WebGIS Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>

    /* ======================
       GLOBAL FONT FIX
    ====================== */
    body {
      margin: 0;
      display: flex;
      font-family: "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ======================
       SIDEBAR
    ====================== */
    #sidebar {
      width: 300px;
      height: 100vh;
      overflow: auto;
      background: #f4f4f4;
      padding: 10px;
      border-right: 1px solid #ccc;

      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    /* ======================
       PANEL TEXT FIX
    ====================== */
    #colorPanel span,
    #list div {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
    }

    /* ======================
       MAP
    ====================== */
    #map {
      flex: 1;
      height: 100vh;
    }

    /* ======================
       LIST ITEM
    ====================== */
    .item {
      padding: 8px;
      margin: 5px 0;
      background: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .item:hover {
      background: #ddd;
    }

    /* ======================
       COLOR INPUT FIX
    ====================== */
    input[type="color"] {
      width: 30px;
      height: 25px;
      border: none;
      background: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="sidebar">
  <h3>🗺️ Eyalet Renkleri</h3>

  <div id="colorPanel"></div>

  <h3>📍 Eyalet Listesi</h3>
  <div id="list"></div>

  <h4>🎚️ Saydamlık</h4>
  <input id="opacitySlider" type="range" min="0.1" max="1" step="0.1" value="0.7">
</div>

<div id="map"></div>

<script>

// ======================
// HARİTA
// ======================
var map = L.map('map').setView([51, 10], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & CartoDB'
}).addTo(map);

// ======================
// GLOBALS
// ======================
let geoLayer;
let stateColors = {};

// ======================
// COLOR FUNCTION
// ======================
function getColor(name) {
  const colors = [
    "#e41a1c","#377eb8","#4daf4a",
    "#984ea3","#ff7f00","#ffff33",
    "#a65628","#f781bf"
  ];
  return colors[name.charCodeAt(0) % colors.length];
}

// ======================
// STYLE FUNCTION
// ======================
function styleFeature(feature) {
  return {
    color: "#222",
    weight: 1,
    fillColor: stateColors[feature.properties.name] || getColor(feature.properties.name),
    fillOpacity: 0.7
  };
}

// ======================
// OPACITY SLIDER
// ======================
let opacitySlider = document.getElementById("opacitySlider");

opacitySlider.addEventListener("input", function(e) {
  let value = e.target.value;

  geoLayer.setStyle(function(feature) {
    return {
      color: "#222",
      weight: 1,
      fillColor: stateColors[feature.properties.name] || getColor(feature.properties.name),
      fillOpacity: parseFloat(value)
    };
  });
});

// ======================
// GEOJSON MAP
// ======================
fetch("https://germany-api.onrender.com/states")
  .then(r => r.json())
  .then(data => {

    geoLayer = L.geoJSON(data, {

      style: styleFeature,

      onEachFeature: function(feature, layer) {

        layer.bindPopup(feature.properties.name);

        layer.on({

          mouseover: function(e) {
            let layer = e.target;

            layer.setStyle({
              weight: 3,
              color: "#ffffff",
              fillOpacity: 0.9
            });

            layer.bringToFront();
          },

          mouseout: function(e) {
            geoLayer.resetStyle(e.target);
          }

        });

      }

    }).addTo(map);

    // ======================
    // COLOR PANEL
    // ======================
    let panel = document.getElementById("colorPanel");

    data.features.forEach(f => {

      let name = f.properties.name;
      stateColors[name] = getColor(name);

      let row = document.createElement("div");
      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.margin = "5px 0";
      row.style.alignItems = "center";

      let label = document.createElement("span");
      label.innerText = name;

      let input = document.createElement("input");
      input.type = "color";
      input.value = stateColors[name];

      input.oninput = (e) => {
        stateColors[name] = e.target.value;
        geoLayer.setStyle(styleFeature);
      };

      row.appendChild(label);
      row.appendChild(input);
      panel.appendChild(row);
    });

  });

// ======================
// DASHBOARD LIST
// ======================
fetch("https://germany-api.onrender.com/states_list")
  .then(r => r.json())
  .then(list => {

    let container = document.getElementById("list");

    list.forEach(name => {

      let div = document.createElement("div");
      div.className = "item";
      div.innerHTML = name;

      div.onclick = () => {

        geoLayer.eachLayer(layer => {
          if(layer.feature.properties.name === name) {
            map.fitBounds(layer.getBounds());
            layer.openPopup();
          }
        });

      };

      container.appendChild(div);
    });

  });

</script>

</body>
</html>
