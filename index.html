<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:340px;
  margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f;
  padding:15px;
  color:white;
  overflow:auto;
}

#map {
  flex:1;
  margin-top:60px;
  height:calc(100vh - 60px);
}

.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

/* =========================
   LAYER ITEMS
========================= */

.item{

  display:grid;

  grid-template-columns: 120px 1fr 42px;

  align-items:center;

  gap:12px;

  padding:12px;

  margin:8px 0;

  background:#25253a;

  border-radius:14px;

  transition:0.25s ease;

  border:1px solid rgba(255,255,255,0.04);

}

.item:hover{
  background:#2d2d46;
  transform:translateY(-1px);
}

/* LABEL */
.item span{

  color:#f1f1f1;

  font-size:14px;

  line-height:1.3;

  font-weight:500;

  word-break:break-word;

  cursor:pointer;

}

/* SLIDER */
.item input[type="range"]{

  width:100%;

  accent-color:#c400ff;

}

/* COLOR PICKER */
.item input[type="color"]{

  width:38px;

  height:38px;

  padding:3px;

  border-radius:10px;

  border:2px solid #000;

  background:#111;

  cursor:pointer;

  box-shadow:
    inset 0 0 4px rgba(255,255,255,0.15),
    0 0 6px rgba(0,0,0,0.5);

}

/* COLOR INSIDE */
.item input[type="color"]::-webkit-color-swatch{

  border:none;

  border-radius:6px;

}

.item input[type="color"]::-webkit-color-swatch-wrapper{
  padding:0;
}

.analysis-card{
  background:#2a2a40;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.desc{
  font-size:12px;
  color:#ccc;
  line-height:1.5;
  background:#1a1a2a;
  padding:10px;
  border-radius:8px;
}

#chart_area{
  height:260px !important;
}

#pie_area{
  height:260px !important;
  width:260px !important;
  margin:auto;
}
  #map { position:relative; }

#drawTools{
  position:absolute;
  top:90px;
  right:15px;
  z-index:1000;

  background:#1e1e2f;
  padding:14px;
  border-radius:14px;

  display:flex;
  flex-direction:column;
  gap:10px;

  box-shadow:0 0 12px rgba(0,0,0,0.5);
}

#drawTools button{
  background:#2a2a40;
  color:white;
  border:none;

  padding:12px 14px;
  border-radius:8px;

  cursor:pointer;
  font-size:14px;
}

#drawTools button:hover{
  background:#ff00cc;
}
  .analysis-section{
  background:#2a2a40;
  border-radius:10px;
  margin-bottom:10px;
  overflow:hidden;
}

.analysis-header{
  padding:10px;
  cursor:pointer;
  font-weight:600;
  background:#1e1e2f;
}

.analysis-content{
  display:none;
  padding:10px;
}

.analysis-section.active .analysis-content{
  display:block;
}

  /* =========================
   SIDE PANELS
========================= */

.sidePanel{
  position:fixed;
  top:70px;
  width:320px;
  height:calc(100vh - 80px);

  background:rgba(20,20,35,0.96);
  backdrop-filter:blur(10px);

  z-index:2000;

  border-radius:16px;

  overflow:hidden;

  transition:all 0.35s ease;

  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* LEFT */
.sidePanel.left{
  left:10px;
}

/* RIGHT */
.sidePanel.right{
  right:10px;
}

/* CLOSED STATES */
.sidePanel.left.closed{
  transform:translateX(-285px);
}

.sidePanel.right.closed{
  transform:translateX(285px);
}

/* HEADER */
.panelHeader{

  background:linear-gradient(90deg,#ff00cc,#7a00ff);

  padding:16px;

  font-weight:700;

  cursor:pointer;

  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;
  align-items:center;
  justify-content:space-between;

  letter-spacing:0.5px;

  color:white;

  box-shadow:
    0 0 12px rgba(255,0,204,0.35);

}

/* CONTENT */
.panelContent{
  padding:12px;
  overflow:auto;
  height:calc(100% - 60px);
}

/* MAP */
#map{
  width:100%;
  height:100vh;
}

  /* =========================
   GROUPS
========================= */

.layerGroup{

  margin-bottom:14px;

  background:#1d1d30;

  border-radius:14px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,0.04);

}

/* HEADER */
.groupHeader{

  padding:14px;

  cursor:pointer;

  font-weight:600;

  background:linear-gradient(90deg,#ff00cc,#8b00ff);

  transition:0.25s ease;

  user-select:none;

  color:white;

  box-shadow:
    0 0 10px rgba(255,0,204,0.25);

}

.groupHeader:hover{

  filter:brightness(1.15);

}

/* CONTENT */
.groupContent{

  padding:10px;

  display:block;

}

/* COLLAPSED */
.layerGroup.closed .groupContent{
  display:none;
}

/* MINI ITEM */
.miniItem{

  padding:10px;

  border-radius:10px;

  background:#2a2a40;

  color:#eee;

  font-size:14px;

}

  .airportItem{

  cursor:pointer;

  transition:0.25s ease;

}

.airportItem:hover{

  background:#ff00cc;

  color:white;

  transform:translateX(4px);

}

  .leaflet-marker-icon{

  filter:
    drop-shadow(0 0 6px #ff00cc)
    drop-shadow(0 0 12px #ff00cc);

}

</style>
</head>

<body>



<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<!-- LEFT PANEL -->
<div id="leftPanel" class="sidePanel left open">

  <div class="panelHeader" onclick="togglePanel('leftPanel')">
    🗂 Harita Verileri
  </div>

  <div class="panelContent">

  <!-- EYALET -->
  <div class="layerGroup">

    <div class="groupHeader"
         onclick="toggleGroup(this)">
      🟢 Eyalet Verileri
    </div>

    <div class="groupContent">
      <div id="list"></div>
    </div>

  </div>

  <!-- AIRPORT -->
  <div class="layerGroup">

    <div class="groupHeader"
         onclick="toggleGroup(this)">
      ✈️ Havalimanı Verileri
    </div>

    <div class="groupContent">

      <div class="miniItem airportItem"
     onclick="toggleAirportLayer()">

  ✈️ Almanya Airports

</div>

    </div>

  </div>

</div>

</div>

<!-- RIGHT PANEL -->
<div id="rightPanel" class="sidePanel right open">

  <div class="panelHeader" onclick="togglePanel('rightPanel')">
    📊 Analiz Katmanları
  </div>

  <div class="panelContent">
    <div id="analysisTab"></div>
  </div>

</div>


<div id="map">

  <div id="drawTools">
    <button onclick="startPolygon()">📐 Alan</button>
    <button onclick="startLine()">📏 Çizgi</button>
    <button onclick="clearDraw()">🧹 Temizle</button>



  </div>

</div>


<script>

var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, layerMap={}, stateColors={}, opacityMap={};
let charts={}, chartData={}, animationInterval=null;
let airportLayer;

function randomColor(){
  return `hsl(${Math.random()*360},70%,60%)`;
}

/* PANEL TOGGLE */
function togglePanel(id){

  let panel = document.getElementById(id);

  panel.classList.toggle("closed");

}

function toggleGroup(header){

  let group = header.parentElement;

  group.classList.toggle("closed");

}

function toggleAirportLayer(){

  if(map.hasLayer(airportLayer)){

    map.removeLayer(airportLayer);

  } else {

    airportLayer.addTo(map);

  }

}

function resetLayerStyle(){
  geoLayer.eachLayer(l=>{
    let n=l.feature.properties.name;
    if(animationInterval){
      l.setStyle({ fillColor:"#ff00cc", fillOpacity:0.15, color:"#444", weight:1 });
    } else {
      l.setStyle({ fillColor: stateColors[n], fillOpacity: opacityMap[n], color:"#222", weight:1 });
    }
  });
}

function togglePanel(id){

  let panel = document.getElementById(id);

  panel.classList.toggle("closed");

  if(id==="leftPanel"){
    stopAnimation();
    resetLayerStyle();
  }

}

// ======================
// ANALYSIS PANEL
// ======================
function buildAnalysisUI(data){

  let container = document.getElementById("analysisTab");
  container.innerHTML="";

  let div = document.createElement("div");
  div.className="analysis-card";

let hint = document.createElement("div");
hint.innerText = "Alan analizi kutucuğuna tıkla ve analiz animasyonu başlasın";
hint.style.fontSize = "11px";
hint.style.color = "#aaa";
hint.style.marginBottom = "6px";
hint.style.fontWeight = "600";

  let title = document.createElement("div");
  title.innerText = "📊 Alan Analizi";
  title.style.cursor="pointer";
  title.style.fontWeight="bold";
  title.style.background="#1e1e2f";
  title.style.padding="6px 10px";
  title.style.borderRadius="6px";

  title.onclick = ()=> startAnimation("area");

  let lineCanvas = document.createElement("canvas");
  lineCanvas.id = "chart_area";

  let pieCanvas = document.createElement("canvas");
  pieCanvas.id = "pie_area";

  let desc = document.createElement("div");
  desc.id = "areaDesc";
  desc.className = "desc";

  div.append(hint, title, lineCanvas, pieCanvas, desc);
  container.appendChild(div);

  createCharts(data);

  // 📌 METODOLOJİ GERİ EKLENDİ
  let info = document.createElement("div");
  info.className = "desc";
  info.innerHTML = `
  <b>📌 Veri ve Hesaplama Yöntemi</b><br>
  Bu projede kullanılan eyalet alan (hektar) verisi doğrudan web harita üzerinde hesaplanmamış, veri hazırlama sürecinde önceden üretilmiştir.
  Eyalet sınırları vektör veri formatında (GeoJSON veya Shapefile) olup her eyalet çokgen geometrisi olarak temsil edilmektedir.
  Alan hesaplamaları Python ve GeoPandas kullanılarak gerçekleştirilmiştir.
  `;
  container.appendChild(info);


}


// ======================
// CHARTS
// ======================
function createCharts(data){

  let sorted = [...data.features].sort((a,b)=> a.properties.area_ha - b.properties.area_ha);

  let labels = sorted.map(f=>f.properties.name);
  let values = sorted.map(f=>f.properties.area_ha);

  chartData["area"] = {labels, values};

  charts["area"] = new Chart(document.getElementById("chart_area"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        data:values,
        borderColor:"#ff00cc",
        backgroundColor:"rgba(255,0,204,0.2)",
        fill:true,
        tension:0.4,
        pointRadius:4,
        borderWidth:2
      }]
    },
    options:{
  responsive:true,
  maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{
      ticks:{
        color:"#eee",
        font:{
          size:11,
          weight:"500"
        },
        maxRotation:40,   // 🔥 eğim verildi
        minRotation:40,
        autoSkip:true,
        maxTicksLimit:7
      },
      grid:{display:false}
    },
    y:{
      ticks:{
        color:"#eee",
        font:{
          size:11
        },
        callback: v => (v/1000000).toFixed(1)+"M"
      },
      grid:{color:"rgba(255,255,255,0.08)"}
    }
  }
}
  });

  // 🍩 PIE GERİ GELDİ
  charts["pie"] = new Chart(document.getElementById("pie_area"),{
    type:"doughnut",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor: labels.map(()=>"#2f2f3a"),
        borderColor:"#555",
        borderWidth:1.5
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      cutout:"65%"
    }
  });
}

// ======================
// ANIMATION
// ======================
function startAnimation(type){

  if(animationInterval) clearInterval(animationInterval);

  let layers=[];
  geoLayer.eachLayer(l=>layers.push(l));
  layers.sort((a,b)=>a.feature.properties.area_ha - b.feature.properties.area_ha);

  let i=0;

  animationInterval=setInterval(()=>{

    resetLayerStyle();

    let layer = layers[i];
    let name = layer.feature.properties.name;
    let value = layer.feature.properties.area_ha;

    layer.setStyle({ fillColor:"#ff00cc", fillOpacity:1, color:"#fff", weight:3 });

    document.getElementById("areaDesc").innerHTML =
      `<b>${name}</b> → ${value.toLocaleString()} hektar`;

    let {labels} = chartData[type];

    charts[type].data.datasets[0].pointBackgroundColor =
      labels.map((l,idx)=> idx===i ? "#ff00cc" : "#fff");

    charts[type].update();

    charts["pie"].data.datasets[0].backgroundColor =
      labels.map((l,idx)=> idx===i ? "#ff00cc" : "#2f2f3a");

    charts["pie"].update();

    i++;
    if(i>=layers.length) i=0;

  },2200);
}

function stopAnimation(){
  if(animationInterval){
    clearInterval(animationInterval);
    animationInterval=null;
  }
}

// ======================
// DATA
// ======================
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:f=>{
      let name=f.properties.name;
      stateColors[name]=randomColor();
      opacityMap[name]=0.5;
      return { fillColor:stateColors[name], fillOpacity:0.5, color:"#222", weight:1 };
    },
    onEachFeature:(f,l)=>{ layerMap[f.properties.name]=l; }
  }).addTo(map);

  // 🔥 AIRPORT DATA
  fetch("data_airport2/ALmanya_airports.geojson")
  .then(r=>r.json())
  .then(airportData=>{
    let airportIcon = L.icon({

  iconUrl:'icons/plane.png',

  iconSize:[28,28],

  iconAnchor:[14,14],

  popupAnchor:[0,-12]

});

airportLayer = L.geoJSON(airportData,{

  pointToLayer:function(feature,latlng){

    return L.marker(latlng,{
      icon:airportIcon
    });

  }

});
  });

  // 🔥 BURAYA AL
  buildAnalysisUI(data);

  let container=document.getElementById("list");

  data.features.forEach(f=>{
    let name=f.properties.name;

    let div=document.createElement("div");
    div.className="item";

    let label=document.createElement("span");
    label.innerText=name;
    label.onclick=()=> map.fitBounds(layerMap[name].getBounds());

    let slider=document.createElement("input");
    slider.type="range"; slider.min=0.1; slider.max=1; slider.step=0.1; slider.value=0.5;

    let color=document.createElement("input");
    color.type="color"; color.value=stateColors[name];

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({ fillOpacity:slider.value });
    };

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({ fillColor:color.value });
    };

    div.append(label, slider, color);
    container.appendChild(div);
  });

  map.fitBounds(geoLayer.getBounds());

});

// ======================
// TOOL (EKSTRA)
// ======================

let drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

let drawControl;

function startPolygon(){
  if(drawControl) map.removeControl(drawControl);

  drawControl = new L.Control.Draw({
    draw:{
      polygon:true,
      polyline:false,
      rectangle:false,
      circle:false,
      marker:false
    },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);
}

function startLine(){
  if(drawControl) map.removeControl(drawControl);

  drawControl = new L.Control.Draw({
    draw:{
      polygon:false,
      polyline:true,
      rectangle:false,
      circle:false,
      marker:false
    },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);
}

function clearDraw(){
  drawnItems.clearLayers();
}

map.on(L.Draw.Event.CREATED, function (e) {

  let layer = e.layer;
  drawnItems.addLayer(layer);

  if (e.layerType === 'polygon') {
    let area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
    let ha = (area / 10000).toFixed(2);
    layer.bindPopup("Alan: " + ha + " ha").openPopup();
  }

  if (e.layerType === 'polyline') {
    let latlngs = layer.getLatLngs();
    let distance = 0;

    for(let i=0; i<latlngs.length-1; i++){
      distance += latlngs[i].distanceTo(latlngs[i+1]);
    }

    layer.bindPopup("Uzunluk: " + distance.toFixed(2) + " m").openPopup();
  }

});

</script>
</body>
</html>
