<!DOCTYPE html>
<html>
<head>
  <title>Germany WebGIS Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: Arial;
    }

    #sidebar {
      width: 300px;
      height: 100vh;
      overflow: auto;
      background: #f4f4f4;
      padding: 10px;
      border-right: 1px solid #ccc;
    }

    #map {
      flex: 1;
      height: 100vh;
    }

    .item {
      padding: 8px;
      margin: 5px 0;
      background: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .item:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>🇩🇪 Eyaletler</h3>
  <div id="list"></div>
</div>

<div id="map"></div>

<script>

// HARİTA
var map = L.map('map').setView([51, 10], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let geoLayer;

// HARİTA VERİSİ
fetch("http://127.0.0.1:8000/states")
  .then(r => r.json())
  .then(data => {

    geoLayer = L.geoJSON(data, {
      style: {
        color: "blue",
        weight: 2
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(feature.properties.name);
      }
    }).addTo(map);

  });

// DASHBOARD LİSTE
fetch("http://127.0.0.1:8000/states_list")
  .then(r => r.json())
  .then(list => {

    let container = document.getElementById("list");

    list.forEach(name => {
      let div = document.createElement("div");
      div.className = "item";
      div.innerHTML = name;

      div.onclick = () => {

        geoLayer.eachLayer(layer => {
          if(layer.feature.properties.name === name) {
            map.fitBounds(layer.getBounds());
            layer.openPopup();
          }
        });

      };

      container.appendChild(div);
    });

  });

</script>

</body>
</html>
