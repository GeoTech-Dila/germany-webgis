<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Germany WebGIS Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    #sidebar {
  width: 320px;
  height: calc(100vh - 60px); /* 👈 header için boşluk */
  margin-top: 60px;           /* 👈 header’ın altına it */
  overflow: auto;
  background: #1e1e2f;
  color: white;
  padding: 15px;
}

    #map {
  flex: 1;
  height: calc(100vh - 60px); /* 👈 header boşluğu */
  margin-top: 60px;           /* 👈 aşağı kaydır */
  animation: fadeIn 1s ease-in;
}

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .item {
      padding: 8px;
      margin: 6px 0;
      background: #2a2a40;
      color: white;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item:hover {
      background: #3a3a55;
    }

    input[type="color"] {
      width: 30px;
      height: 25px;
      border: none;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #00ffff;
    }

    .legend {
      background: rgba(30,30,47,0.9);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .legend h4 {
      margin: 0 0 8px 0;
      color: #00ffff;
    }
    /* ======================
   HEADER (TOP BAR)
====================== */
#header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: #121222;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
  border-bottom: 1px solid #333;
}

#header .logo {
  font-weight: bold;
  color: #00ffff;
  font-size: 18px;
}

#header .title {
  color: white;
  font-size: 16px;
}
  </style>
</head>

<body>

<div id="header">
  <div class="logo">🌍 GeoTech Dila</div>
  <div class="title">Germany WebGIS Dashboard</div>
</div>

<div id="sidebar">
  <h2 style="color:#00ffff;">🌍 WebGIS Dashboard</h2>

  <h3>📍 Eyalet Listesi</h3>
  <div id="list"></div>

  <h4>🎚️ Saydamlık</h4>
  <input id="opacitySlider" type="range" min="0.1" max="1" step="0.1" value="0.7">
</div>

<div id="map"></div>

<script>

// ======================
// HARİTA
// ======================
var map = L.map('map').setView([51, 10], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// ======================
let geoLayer;
let stateColors = {};

// ======================
function getColor(name) {
  const colors = ["#e41a1c","#377eb8","#4daf4a","#984ea3","#ff7f00","#ffff33"];
  return colors[name.charCodeAt(0) % colors.length];
}

// ======================
function styleFeature(feature) {
  return {
    color: "#222",
    weight: 1,
    fillColor: stateColors[feature.properties.name] || getColor(feature.properties.name),
    fillOpacity: 0.7
  };
}

// ======================
// OPACITY
// ======================
document.getElementById("opacitySlider").addEventListener("input", e => {
  let val = parseFloat(e.target.value);

  geoLayer.setStyle(f => ({
    color: "#222",
    weight: 1,
    fillColor: stateColors[f.properties.name] || getColor(f.properties.name),
    fillOpacity: val
  }));
});

// ======================
// GEOJSON
// ======================
fetch("https://germany-webgis-1.onrender.com/states")
  .then(r => r.json())
  .then(data => {

    geoLayer = L.geoJSON(data, {

      style: styleFeature,

      onEachFeature: function(feature, layer) {

        layer.bindPopup(`
          <b>${feature.properties.name}</b><br>
          🌍 ${feature.properties.area_ha
            ? feature.properties.area_ha.toLocaleString() + " ha"
            : "bilgi yok"}
        `);

        layer.on({
          mouseover: e => {
            e.target.setStyle({
              weight: 3,
              color: "#00ffff",
              fillOpacity: 1
            });
          },
          mouseout: e => geoLayer.resetStyle(e.target)
        });
      }

    }).addTo(map);

    // ======================
    // LİSTE + RENK + ZOOM
    // ======================
    let container = document.getElementById("list");

    data.features.forEach(f => {

      let name = f.properties.name;
      stateColors[name] = getColor(name);

      let div = document.createElement("div");
      div.className = "item";

      let label = document.createElement("span");
      label.innerText = name;
      label.style.cursor = "pointer";

      label.onclick = () => {
  geoLayer.eachLayer(layer => {
    if(layer.feature.properties.name === name) {

      let bounds = layer.getBounds();

      map.fitBounds(bounds, {
        padding: [50, 50],
        animate: true,
        duration: 1.5
      });

      map.panTo(bounds.getCenter());

      layer.openPopup();
    }
  });
};

      let input = document.createElement("input");
      input.type = "color";
      input.value = stateColors[name];

      input.onclick = e => e.stopPropagation();

      input.oninput = e => {
        stateColors[name] = e.target.value;
        geoLayer.setStyle(styleFeature);
      };

      div.appendChild(label);
      div.appendChild(input);
      container.appendChild(div);
    });

    // ======================
    // LEGEND
    // ======================
    let legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
      let div = L.DomUtil.create("div", "legend");
      div.innerHTML = "<h4>Legend</h4>";

      data.features.forEach(f => {
        div.innerHTML += `
          <div>
            <span style="background:${stateColors[f.properties.name]}; width:15px; height:15px; display:inline-block;"></span>
            ${f.properties.name}
          </div>
        `;
      });

      return div;
    };

    legend.addTo(map);

    map.fitBounds(geoLayer.getBounds());
});

</script>

</body>
</html>
