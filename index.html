<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:320px; margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f; padding:15px; color:white;
  overflow:auto;
}

#map {
  flex:1; margin-top:60px;
  height:calc(100vh - 60px);
}

.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

/* GRID */
.item {
  display:grid;
  grid-template-columns: 30px 140px 40px 1fr;
  align-items:center;
  gap:10px;
  padding:10px;
  margin:6px 0;
  background:#2a2a40;
  border-radius:8px;
}

.eye { text-align:center; cursor:pointer; }

input[type="color"] {
  width:32px; height:32px;
  border:2px solid #555;
  border-radius:6px;
}

input[type="range"] {
  width:100%;
  accent-color:#bb00ff;
}

canvas {
  background:#2a2a40;
  margin-top:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">

<button class="tab active" onclick="switchTab('layers')">Layers</button>
<button class="tab" onclick="switchTab('analysis')">Analysis</button>

<div id="layersTab">
  <div id="list"></div>
</div>

<div id="analysisTab" style="display:none;">

<select id="analysisType">
  <option value="density">Yoğunluk</option>
  <option value="population">Nüfus</option>
  <option value="area">Alan</option>
</select>

<div id="legend"></div>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
<canvas id="chart3"></canvas>

<div id="analysisText" style="margin-top:10px;"></div>

</div>

</div>

<div id="map"></div>

<script>

function switchTab(tab){
  document.getElementById("layersTab").style.display="none";
  document.getElementById("analysisTab").style.display="none";
  document.getElementById(tab+"Tab").style.display="block";
}

// MAP
var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer;
let layerMap = {};
let stateColors = {};
let opacityMap = {};

let populationData = {
  "Bayern":13124737,
  "Berlin":3669491,
  "Hessen":6293154,
  "Hamburg":1841179
};

// 🎨 RANDOM COLOR (LAYER MODE)
function randomColor(){
  return `hsl(${Math.random()*360},70%,60%)`;
}

// ANALYSIS COLOR
function getColor(v, breaks){
  return v > breaks[4] ? '#4a0033' :
         v > breaks[3] ? '#80004d' :
         v > breaks[2] ? '#b3006b' :
         v > breaks[1] ? '#e60099' :
         v > breaks[0] ? '#ff4dc4' :
                         '#ffb3ec';
}

function getValue(f,type){
  let area = f.properties.area_ha || 1;
  let pop = populationData[f.properties.name] || 1;

  if(type==="density") return pop/area;
  if(type==="population") return pop;
  if(type==="area") return area;
}

function getBreaks(vals){
  vals.sort((a,b)=>a-b);
  return [
    vals[3], vals[6], vals[9], vals[12], vals[15]
  ];
}

function applyAnalysis(type){

  let vals=[];
  geoLayer.eachLayer(l=>vals.push(getValue(l.feature,type)));
  let breaks=getBreaks(vals);

  geoLayer.setStyle(f=>({
    fillColor:getColor(getValue(f,type),breaks),
    color:"#222", fillOpacity:0.8
  }));

  updateLegend(breaks);
  createCharts(type);
}

function updateLegend(breaks){
  let div=document.getElementById("legend");
  div.innerHTML="<h4>🎨 Analiz</h4>";
  breaks.forEach(b=>{
    div.innerHTML+=`<div>${b.toFixed(2)}</div>`;
  });
}

// 📊 CHARTS
let charts=[];

function createCharts(type){

  charts.forEach(c=>c.destroy());
  charts=[];

  let labels=[];
  let values=[];

  geoLayer.eachLayer(l=>{
    labels.push(l.feature.properties.name);
    values.push(getValue(l.feature,type));
  });

  function makeChart(id){
    return new Chart(document.getElementById(id),{
      type:'bar',
      data:{ labels, datasets:[{ data:values }] },
      options:{
        animation:{ duration:2000 },
        plugins:{ legend:{display:false} }
      }
    });
  }

  charts.push(makeChart("chart1"));
  charts.push(makeChart("chart2"));
  charts.push(makeChart("chart3"));

  document.getElementById("analysisText").innerHTML = `
  Bu grafikler ${type} dağılımını göstermektedir.
  Küçükten büyüğe sıralanmış veriler bölgesel farklılıkları ortaya koyar.
  `;
}

// DATA
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:f=>{
      let name=f.properties.name;
      stateColors[name]=randomColor();
      opacityMap[name]=0.5;

      return {
        fillColor:stateColors[name],
        fillOpacity:0.5,
        color:"#222"
      };
    },
    onEachFeature:(f,l)=>{
      layerMap[f.properties.name]=l;
    }
  }).addTo(map);

  let container=document.getElementById("list");

  data.features.forEach(f=>{

    let name=f.properties.name;

    let div=document.createElement("div");
    div.className="item";

    let eye=document.createElement("span");
    eye.innerText="👁️";
    let visible=true;

    eye.onclick=e=>{
      e.stopPropagation();
      let layer=layerMap[name];
      visible?map.removeLayer(layer):map.addLayer(layer);
      eye.innerText=visible?"🚫":"👁️";
      visible=!visible;
    };

    let label=document.createElement("span");
    label.innerText=name;

    let color=document.createElement("input");
    color.type="color";
    color.value=stateColors[name];

    let slider=document.createElement("input");
    slider.type="range";
    slider.min=0.1; slider.max=1; slider.step=0.1;
    slider.value=0.5;

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({
        fillColor:color.value,
        fillOpacity:opacityMap[name]
      });
    };

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({
        fillColor:stateColors[name],
        fillOpacity:slider.value
      });
    };

    div.appendChild(eye);
    div.appendChild(label);
    div.appendChild(color);
    div.appendChild(slider);

    container.appendChild(div);
  });

  map.fitBounds(geoLayer.getBounds());

});

// EVENT
document.getElementById("analysisType")
.addEventListener("change",e=>{
  applyAnalysis(e.target.value);
});

</script>

</body>
</html>
