<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body {
  margin: 0;
  display: flex;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* HEADER */
#header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #121222;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  color: white;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  width: 320px;
  margin-top: 60px;
  height: calc(100vh - 60px);
  background: #1e1e2f;
  padding: 15px;
  color: white;
  overflow: auto;
}

/* MAP */
#map {
  flex: 1;
  margin-top: 60px;
  height: calc(100vh - 60px);
}

/* TABS */
#tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.tab {
  flex: 1;
  padding: 8px;
  background: #2a2a40;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.tab.active {
  background: #00ffff;
  color: black;
}

/* LIST */
.item {
  padding: 10px;
  margin: 6px 0;
  background: #2a2a40;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.item.active {
  border: 1px solid #00ffff;
  background: #1e3a3a;
}

/* ANALYSIS BOX */
#analysisBox {
  background:#2a2a40;
  padding:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>Germany WebGIS Dashboard</div>
</div>

<div id="sidebar">

<div id="tabs">
  <button class="tab active" onclick="switchTab('layers')">Layers</button>
  <button class="tab" onclick="switchTab('analysis')">Analysis</button>
</div>

<div id="layersTab" class="tabContent">
  <div id="list"></div>
</div>

<div id="analysisTab" class="tabContent" style="display:none;">
  <h3>📊 Analysis</h3>

  <select id="analysisType" style="width:100%; margin-bottom:10px;">
    <option value="density">Yoğunluk</option>
    <option value="population">Nüfus</option>
    <option value="area">Alan</option>
  </select>

  <div id="analysisBox">
    <p>Analiz seç...</p>
  </div>
</div>

</div>

<div id="map"></div>

<script>

// TAB SWITCH
function switchTab(tab){
  document.querySelectorAll(".tabContent").forEach(e=>e.style.display="none");
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));

  document.getElementById(tab+"Tab").style.display="block";
  event.target.classList.add("active");
}

// MAP
var map = L.map('map').setView([51, 10], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer;
let stateColors = {};
let layerMap = {};

let populationData = {
  "Bayern": 13124737,
  "Berlin": 3669491,
  "Hessen": 6293154,
  "Hamburg": 1841179
};

// 🔥 ANALİZ METNİ
function generateAnalysisText(type, data){

  let results = [];

  data.features.forEach(f=>{
    let name = f.properties.name;
    let area = f.properties.area_ha || 0;
    let pop = populationData[name] || 0;

    let value = 0;

    if(type === "density") value = pop / area;
    if(type === "population") value = pop;
    if(type === "area") value = area;

    results.push({name, value});
  });

  results.sort((a,b)=>b.value - a.value);

  let max = results[0];
  let min = results[results.length-1];
  let avg = results.reduce((s,r)=>s+r.value,0) / results.length;

  let yorum = {
    density: "Yoğunluk, nüfus baskısını gösterir.",
    population: "Nüfus dağılımını gösterir.",
    area: "Alan büyüklüğünü gösterir."
  };

  document.getElementById("analysisBox").innerHTML = `
    🔝 En yüksek: <b>${max.name}</b> (${max.value.toFixed(2)})<br>
    🔻 En düşük: <b>${min.name}</b> (${min.value.toFixed(2)})<br>
    📈 Ortalama: ${avg.toFixed(2)}<br><br>
    🧠 ${yorum[type]}
  `;
}

// ANALİZ EVENT
document.getElementById("analysisType").addEventListener("change", e=>{
  generateAnalysisText(e.target.value, globalData);
});

let globalData;

// DATA
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  globalData = data;

  geoLayer = L.geoJSON(data,{
    style: f=>({color:"#222",weight:1,fillOpacity:0.7}),
    onEachFeature:(f,l)=>{

      layerMap[f.properties.name] = l;

      l.bindPopup(`<b>${f.properties.name}</b>`);

      l.on({
        mouseover:e=>e.target.setStyle({weight:3,color:"#00ffff"}),
        mouseout:e=>geoLayer.resetStyle(e.target)
      });

    }
  }).addTo(map);

  let container = document.getElementById("list");

  data.features.forEach(f=>{

    let name = f.properties.name;

    let div = document.createElement("div");
    div.className="item";

    let eye = document.createElement("span");
    eye.innerText="👁️";

    let visible=true;
    eye.onclick=e=>{
      e.stopPropagation();
      let layer=layerMap[name];
      visible ? map.removeLayer(layer) : map.addLayer(layer);
      eye.innerText = visible ? "🚫" : "👁️";
      visible=!visible;
    };

    let label = document.createElement("span");
    label.innerText=name;

    label.onclick=()=>{
      let layer=layerMap[name];
      let b=layer.getBounds();
      map.fitBounds(b);
      map.panTo(b.getCenter());
      layer.openPopup();
    };

    div.appendChild(eye);
    div.appendChild(label);
    container.appendChild(div);
  });

  map.fitBounds(geoLayer.getBounds());

  // 🔥 ilk analiz
  generateAnalysisText("density", data);

});
</script>

</body>
</html>
