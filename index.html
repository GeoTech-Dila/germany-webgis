<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Germany WebGIS Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>

    /* ======================
       GLOBAL FONT FIX
    ====================== */
    body {
      margin: 0;
      display: flex;
      font-family: "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ======================
       SIDEBAR
    ====================== */
    #sidebar {
  width: 320px;
  height: 100vh;
  overflow: auto;
  background: #1e1e2f;
  color: white;
  padding: 15px;
  border-right: none;
}

#sidebar h3, #sidebar h4 {
  margin-top: 15px;
  font-weight: 600;
}

    /* ======================
       PANEL TEXT FIX
    ====================== */
    #colorPanel span,
    #list div {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
    }

    /* ======================
       MAP
    ====================== */
    #map {
  flex: 1;
  height: 100vh;

  /* 👇 fade efekti buraya */
  animation: fadeIn 2s ease-in;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

    /* ======================
       LIST ITEM
    ====================== */
    .item {
      padding: 8px;
      margin: 5px 0;
      background: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .item:hover {
      background: #ddd;
    }

    /* ======================
       COLOR INPUT FIX
    ====================== */
    input[type="color"] {
      width: 30px;
      height: 25px;
      border: none;
      background: none;
      cursor: pointer;
    }
    /* ======================
   SLIDER STYLE
====================== */
input[type="range"] {
  width: 100%;
  accent-color: #00ffff;
}
    /* ======================
   LEGEND STYLE
====================== */
.legend {
  background: rgba(30,30,47,0.9);
  padding: 10px;
  border-radius: 8px;
  color: white;
  font-size: 12px;
  max-height: 300px;
  overflow-y: auto;
}

.legend h4 {
  margin: 0 0 8px 0;
  color: #00ffff;
}

  </style>
</head>

<body>

<div id="sidebar">

  <h2 style="color:#00ffff; margin-bottom:10px;">🌍 WebGIS Dashboard</h2>
  <hr style="border: 1px solid #333;">

  <h3>🗺️ Eyalet Renkleri</h3>
  <div id="colorPanel"></div>

  <h3>📍 Eyalet Listesi</h3>
  <div id="list"></div>

  <h4>🎚️ Saydamlık</h4>
  <input id="opacitySlider" type="range" min="0.1" max="1" step="0.1" value="0.7">

</div>

<div id="map"></div>

<script>

// ======================
// HARİTA
// ======================
var map = L.map('map').setView([51, 10], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '',
}).addTo(map);

// ======================
// GLOBALS
// ======================
let geoLayer;
let stateColors = {};

// ======================
// COLOR FUNCTION
// ======================
function getColor(name) {
  const colors = [
    "#e41a1c","#377eb8","#4daf4a",
    "#984ea3","#ff7f00","#ffff33",
    "#a65628","#f781bf"
  ];
  return colors[name.charCodeAt(0) % colors.length];
}

// ======================
// STYLE FUNCTION
// ======================
function styleFeature(feature) {
  return {
    color: "#222",
    weight: 1,
    fillColor: stateColors[feature.properties.name] || getColor(feature.properties.name),
    fillOpacity: 0.7
  };
}

// ======================
// OPACITY SLIDER
// ======================
let opacitySlider = document.getElementById("opacitySlider");

opacitySlider.addEventListener("input", function(e) {
  let value = e.target.value;

  geoLayer.setStyle(function(feature) {
    return {
      color: "#222",
      weight: 1,
      fillColor: stateColors[feature.properties.name] || getColor(feature.properties.name),
      fillOpacity: parseFloat(value)
    };
  });
});

// ======================
// GEOJSON MAP
// ======================
fetch("https://germany-webgis-1.onrender.com/states")
  .then(r => r.json())
  .then(data => {

    geoLayer = L.geoJSON(data, {

      style: styleFeature,

      onEachFeature: function(feature, layer) {

        layer.bindPopup(`
          <div style="font-size:14px;">
            <b>${feature.properties.name}</b><br>
            🌍 Alan: ${feature.properties.area_ha.toLocaleString()} ha
          </div>
        `);

        layer.on({
          mouseover: function(e) {
            let layer = e.target;

            layer.setStyle({
              weight: 4,
              color: "#00ffff",
              fillOpacity: 1
            });

            layer.bringToFront();
          },

          mouseout: function(e) {
            geoLayer.resetStyle(e.target);
          }
        });

      }

    }).addTo(map);

    // ======================
    // COLOR PANEL
    // ======================
    let panel = document.getElementById("colorPanel");

    data.features.forEach(f => {

      let name = f.properties.name;
      stateColors[name] = getColor(name);

      let row = document.createElement("div");
      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.margin = "5px 0";
      row.style.alignItems = "center";

      row.style.background = "#2a2a40";
      row.style.padding = "6px";
      row.style.borderRadius = "6px";
      row.style.marginBottom = "6px";
      row.style.color = "white";

      let label = document.createElement("span");
      label.innerText = name;

      let input = document.createElement("input");
      input.type = "color";
      input.value = stateColors[name];

      input.oninput = (e) => {
        stateColors[name] = e.target.value;
        geoLayer.setStyle(styleFeature);
      };

      row.appendChild(label);
      row.appendChild(input);
      panel.appendChild(row);
    });

    // ======================
    // LEGEND (DOĞRU YER)
    // ======================
    let legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
      let div = L.DomUtil.create("div", "legend");

      div.innerHTML = "<h4>Legend</h4>";

      data.features.forEach(f => {
        let name = f.properties.name;
        let color = stateColors[name];

        div.innerHTML += `
          <div style="display:flex; align-items:center; margin:4px 0;">
            <span style="
              width:15px;
              height:15px;
              background:${color};
              display:inline-block;
              margin-right:8px;
            "></span>
            ${name}
          </div>
        `;
      });

      return div;
    };

    legend.addTo(map);

    // ======================
    // HARİTA AÇILINCA TAM GÖSTER
    // ======================
    map.fitBounds(geoLayer.getBounds());

});

// ======================
// DASHBOARD LIST
// ======================
fetch("https://germany-webgis-1.onrender.com/states_list")
  .then(r => r.json())
  .then(list => {

    let container = document.getElementById("list");

    list.forEach(name => {

      let div = document.createElement("div");
      div.className = "item";
      div.innerHTML = name;

      div.onclick = () => {

  geoLayer.eachLayer(layer => {
    if(layer.feature.properties.name === name) {

      map.fitBounds(layer.getBounds(), {
        animate: true,
        duration: 1.5
      });

      layer.openPopup();
    }
  });

};

container.appendChild(div);
    });

  });

</script>

</body>
</html>
