<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:340px;
  margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f;
  padding:15px;
  color:white;
  overflow:auto;
}

#map {
  flex:1;
  margin-top:60px;
  height:calc(100vh - 60px);
  position:relative;
}

/* 🔥 TOOLBAR */
#drawTools{
  position:absolute;
  top:80px;
  right:10px;
  z-index:1000;

  background:#1e1e2f;
  padding:8px;
  border-radius:10px;

  display:flex;
  flex-direction:column;
  gap:6px;
}

#drawTools button{
  background:#2a2a40;
  color:white;
  border:none;
  padding:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

#drawTools button:hover{
  background:#ff00cc;
}

/* mevcut css aynen bırakıldı */
.analysis-card{background:#2a2a40;padding:16px;border-radius:12px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px;}
.desc{font-size:12px;color:#ccc;line-height:1.5;background:#1a1a2a;padding:10px;border-radius:8px;}
#chart_area{height:260px !important;}
#pie_area{height:260px !important;width:260px !important;margin:auto;}
</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">
<button onclick="switchTab('layers')" class="tab active">Layers</button>
<button onclick="switchTab('analysis')" class="tab">Analysis</button>

<div id="layersTab"><div id="list"></div></div>
<div id="analysisTab" style="display:none;"></div>
</div>

<div id="map">
  <!-- 🔥 TOOLBAR -->
  <div id="drawTools">
    <button onclick="startPolygon()">📐 Alan</button>
    <button onclick="startLine()">📏 Çevre</button>
    <button onclick="clearDraw()">🧹</button>
  </div>
</div>

<script>

var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, layerMap={}, stateColors={}, opacityMap={};
let charts={}, chartData={}, animationInterval=null;

/* ===========================
   🔥 DRAW TOOL EKLENDİ
=========================== */
let drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

let drawControl;

function startPolygon(){
  if(drawControl) map.removeControl(drawControl);

  drawControl = new L.Control.Draw({
    draw:{ polygon:true, polyline:false, rectangle:false, circle:false, marker:false },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);
}

function startLine(){
  if(drawControl) map.removeControl(drawControl);

  drawControl = new L.Control.Draw({
    draw:{ polygon:false, polyline:true, rectangle:false, circle:false, marker:false },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);
}

function clearDraw(){
  drawnItems.clearLayers();
}

map.on(L.Draw.Event.CREATED, function (e) {

  let layer = e.layer;
  drawnItems.addLayer(layer);

  if (e.layerType === 'polygon') {

    let area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
    let ha = (area / 10000).toFixed(2);

    layer.bindPopup("Alan: " + ha + " ha").openPopup();
  }

  if (e.layerType === 'polyline') {

    let latlngs = layer.getLatLngs();
    let distance = 0;

    for(let i=0; i<latlngs.length-1; i++){
      distance += latlngs[i].distanceTo(latlngs[i+1]);
    }

    layer.bindPopup("Uzunluk: " + distance.toFixed(2) + " m").openPopup();
  }

});
/* =========================== */

function randomColor(){
  return `hsl(${Math.random()*360},70%,60%)`;
}

/* BURADAN SONRASI SENİN KODUN AYNEN DEVAM EDİYOR */
/* hiçbir şey değiştirilmedi */

</script>
</body>
</html>
