<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:320px; margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f; padding:15px; color:white;
  overflow:auto;
}

#map {
  flex:1; margin-top:60px;
  height:calc(100vh - 60px);
}

.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

.item {
  display:grid;
  grid-template-columns: 30px 140px 40px 1fr;
  gap:10px;
  padding:10px;
  margin:6px 0;
  background:#2a2a40;
  border-radius:8px;
}

canvas {
  background:#2a2a40;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">

<button onclick="switchTab('layers')" class="tab active">Layers</button>
<button onclick="switchTab('analysis')" class="tab">Analysis</button>

<div id="layersTab">
  <div id="list"></div>
</div>

<div id="analysisTab" style="display:none;"></div>

</div>

<div id="map"></div>

<script>

// ======================
// MAP
// ======================
var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, layerMap={}, stateColors={}, opacityMap={};

// ======================
// DATA
// ======================
let populationData = {
  "Bayern":13124737,
  "Berlin":3669491,
  "Hessen":6293154,
  "Hamburg":1841179
};

// ======================
// HELPERS
// ======================
function randomColor(){
  return `hsl(${Math.random()*360},70%,60%)`;
}

function getValue(f,type){
  let area = f.properties.area_ha || 1;
  let pop = populationData[f.properties.name] || 1;

  if(type==="density") return pop/area;
  if(type==="population") return pop;
  if(type==="area") return area;
}

// ======================
// LAYERS RESET
// ======================
function resetLayerStyle(){
  geoLayer.eachLayer(l=>{
    let n=l.feature.properties.name;
    l.setStyle({
      fillColor: stateColors[n],
      fillOpacity: opacityMap[n],
      color:"#222"
    });
  });
}

// ======================
// TAB SWITCH
// ======================
function switchTab(tab){
  document.getElementById("layersTab").style.display="none";
  document.getElementById("analysisTab").style.display="none";

  document.getElementById(tab+"Tab").style.display="block";

  if(tab==="layers"){
    stopAnimation();
    resetLayerStyle();
  }
}

// ======================
// ANALYSIS SYSTEM
// ======================
let charts={}, chartData={}, animationInterval=null;

const analysisTypes = [
  {key:"area", label:"Alan"},
  {key:"population", label:"Nüfus"},
  {key:"density", label:"Yoğunluk"}
];

// 🎯 BUILD UI
function buildAnalysisUI(data){

  let container = document.getElementById("analysisTab");
  container.innerHTML="";

  analysisTypes.forEach(type=>{

    let div = document.createElement("div");

    let title = document.createElement("div");
    title.innerText = "📊 " + type.label;
    title.style.cursor="pointer";
    title.style.fontWeight="bold";

    title.onclick = ()=> startAnimation(type.key);

    let canvas = document.createElement("canvas");
    canvas.id = "chart_"+type.key;

    div.appendChild(title);
    div.appendChild(canvas);

    container.appendChild(div);

  });

  createCharts(data);
}

// 📊 CREATE CHARTS
function createCharts(data){

  analysisTypes.forEach(type=>{

    let sorted = [...data.features].sort((a,b)=>
      getValue(a,type.key)-getValue(b,type.key)
    );

    let labels = sorted.map(f=>f.properties.name);
    let values = sorted.map(f=>getValue(f,type.key));

    chartData[type.key] = {labels, values};

    charts[type.key] = new Chart(
      document.getElementById("chart_"+type.key),
      {
        type:"line",
        data:{
          labels,
          datasets:[{
            data:values,
            borderColor:"#ff00cc",
            backgroundColor:"rgba(255,0,204,0.2)",
            tension:0.4,
            pointRadius:4,
            pointBackgroundColor:"#fff"
          }]
        },
        options:{
          plugins:{legend:{display:false}}
        }
      }
    );

  });

}

// 🌟 ANIMATION
function startAnimation(type){

  if(animationInterval) clearInterval(animationInterval);

  let layers=[];
  geoLayer.eachLayer(l=>layers.push(l));

  layers.sort((a,b)=> getValue(a.feature,type)-getValue(b.feature,type));

  let i=0;

  animationInterval=setInterval(()=>{

    resetLayerStyle();

    let layer = layers[i];
    let name = layer.feature.properties.name;
    let value = getValue(layer.feature,type);

    // GLOW
    layer.setStyle({
      fillColor:"#ff00cc",
      fillOpacity:1,
      color:"#fff",
      weight:4
    });

    layer.bindPopup(`<b>${name}</b><br>${value.toLocaleString()}`).openPopup();

    // GRAPH SYNC
    let {labels} = chartData[type];
    let chart = charts[type];

    chart.data.datasets[0].pointBackgroundColor =
      labels.map((l,idx)=> idx===i ? "#ff00cc" : "#fff");

    chart.update();

    i++;
    if(i>=layers.length) i=0;

  },1500);

}

// STOP
function stopAnimation(){
  if(animationInterval){
    clearInterval(animationInterval);
    animationInterval=null;
  }
}

// ======================
// FETCH
// ======================
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:f=>{
      let name=f.properties.name;
      stateColors[name]=randomColor();
      opacityMap[name]=0.5;

      return {
        fillColor:stateColors[name],
        fillOpacity:0.5,
        color:"#222"
      };
    },
    onEachFeature:(f,l)=>{
      layerMap[f.properties.name]=l;
    }
  }).addTo(map);

  buildAnalysisUI(data);

  let container=document.getElementById("list");

  data.features.forEach(f=>{
    let name=f.properties.name;

    let div=document.createElement("div");
    div.className="item";

    let label=document.createElement("span");
    label.innerText=name;

    let color=document.createElement("input");
    color.type="color";
    color.value=stateColors[name];

    let slider=document.createElement("input");
    slider.type="range";
    slider.min=0.1; slider.max=1; slider.step=0.1;
    slider.value=0.5;

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({
        fillColor:color.value,
        fillOpacity:opacityMap[name]
      });
    };

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({
        fillColor:stateColors[name],
        fillOpacity:slider.value
      });
    };

    div.append(label,color,slider);
    container.appendChild(div);
  });

  map.fitBounds(geoLayer.getBounds());

});
</script>

</body>
</html>
