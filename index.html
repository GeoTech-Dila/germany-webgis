<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:340px;
  margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f;
  padding:15px;
  color:white;
  overflow:auto;
}

#map {
  flex:1;
  margin-top:60px;
  height:calc(100vh - 60px);
}

.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

.item {
  display: grid;
  grid-template-columns: 1fr 120px 40px;
  gap: 10px;
  padding: 10px;
  margin: 6px 0;
  background: #2a2a40;
  border-radius: 8px;
}

.item span { cursor:pointer; }

input[type="color"] {
  width:32px; height:32px;
  border:2px solid #555;
  border-radius:6px;
}

input[type="range"] {
  width:100%;
  accent-color:#bb00ff;
}

.analysis-card{
  background:#2a2a40;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.desc{
  font-size:12px;
  color:#ccc;
  line-height:1.5;
  background:#1a1a2a;
  padding:10px;
  border-radius:8px;
}

#chart_area{
  height:260px !important;
}

#pie_area{
  height:260px !important;
  width:260px !important;
  margin:auto;
}
</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">
<button onclick="switchTab('layers')" class="tab active">Layers</button>
<button onclick="switchTab('analysis')" class="tab">Analysis</button>

<div id="layersTab"><div id="list"></div></div>
<div id="analysisTab" style="display:none;"></div>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, layerMap={}, stateColors={}, opacityMap={};
let charts={}, chartData={}, animationInterval=null;

function randomColor(){
  return `hsl(${Math.random()*360},70%,60%)`;
}

function resetLayerStyle(){
  geoLayer.eachLayer(l=>{
    let n=l.feature.properties.name;
    if(animationInterval){
      l.setStyle({ fillColor:"#ff00cc", fillOpacity:0.15, color:"#444", weight:1 });
    } else {
      l.setStyle({ fillColor: stateColors[n], fillOpacity: opacityMap[n], color:"#222", weight:1 });
    }
  });
}

function switchTab(tab){
  document.getElementById("layersTab").style.display="none";
  document.getElementById("analysisTab").style.display="none";
  document.getElementById(tab+"Tab").style.display="block";

  if(tab==="layers"){
    stopAnimation();
    resetLayerStyle();
  }
}

// ======================
// ANALYSIS PANEL
// ======================
function buildAnalysisUI(data){

  let container = document.getElementById("analysisTab");
  container.innerHTML="";

  let div = document.createElement("div");
  div.className="analysis-card";

let hint = document.createElement("div");
hint.innerText = "Alan analizi kutucuğuna tıkla ve analiz animasyonu başlasın";
hint.style.fontSize = "11px";
hint.style.color = "#aaa";
hint.style.marginBottom = "6px";

  let title = document.createElement("div");
  title.innerText = "📊 Alan Analizi";
  title.style.cursor="pointer";
  title.style.fontWeight="bold";
  title.style.background="#1e1e2f";
  title.style.padding="6px 10px";
  title.style.borderRadius="6px";

  title.onclick = ()=> startAnimation("area");

  let lineCanvas = document.createElement("canvas");
  lineCanvas.id = "chart_area";

  let pieCanvas = document.createElement("canvas");
  pieCanvas.id = "pie_area";

  let desc = document.createElement("div");
  desc.id = "areaDesc";
  desc.className = "desc";

  div.append(hint, title, lineCanvas, pieCanvas, desc);
  container.appendChild(div);

  createCharts(data);

  // 📌 METODOLOJİ GERİ EKLENDİ
  let info = document.createElement("div");
  info.className = "desc";
  info.innerHTML = `
  <b>📌 Veri ve Hesaplama Yöntemi</b><br>
  Bu projede kullanılan eyalet alan (hektar) verisi doğrudan web harita üzerinde hesaplanmamış, veri hazırlama sürecinde önceden üretilmiştir.
  Eyalet sınırları vektör veri formatında (GeoJSON veya Shapefile) olup her eyalet çokgen geometrisi olarak temsil edilmektedir.
  Alan hesaplamaları Python ve GeoPandas kullanılarak gerçekleştirilmiştir.
  `;
  container.appendChild(info);
}

// ======================
// CHARTS
// ======================
function createCharts(data){

  let sorted = [...data.features].sort((a,b)=> a.properties.area_ha - b.properties.area_ha);

  let labels = sorted.map(f=>f.properties.name);
  let values = sorted.map(f=>f.properties.area_ha);

  chartData["area"] = {labels, values};

  charts["area"] = new Chart(document.getElementById("chart_area"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        data:values,
        borderColor:"#ff00cc",
        backgroundColor:"rgba(255,0,204,0.2)",
        fill:true,
        tension:0.4,
        pointRadius:4,
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{
          ticks:{
            color:"#ccc",
            autoSkip:true,
            maxTicksLimit:6
          },
          grid:{display:false}
        },
        y:{
          ticks:{
            color:"#ccc",
            callback: v => (v/1000000).toFixed(1)+"M"
          },
          grid:{color:"rgba(255,255,255,0.05)"}
        }
      }
    }
  });

  // 🍩 PIE GERİ GELDİ
  charts["pie"] = new Chart(document.getElementById("pie_area"),{
    type:"doughnut",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor: labels.map(()=>"#2f2f3a"),
        borderColor:"#555",
        borderWidth:1.5
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      cutout:"65%"
    }
  });
}

// ======================
// ANIMATION
// ======================
function startAnimation(type){

  if(animationInterval) clearInterval(animationInterval);

  let layers=[];
  geoLayer.eachLayer(l=>layers.push(l));
  layers.sort((a,b)=>a.feature.properties.area_ha - b.feature.properties.area_ha);

  let i=0;

  animationInterval=setInterval(()=>{

    resetLayerStyle();

    let layer = layers[i];
    let name = layer.feature.properties.name;
    let value = layer.feature.properties.area_ha;

    layer.setStyle({ fillColor:"#ff00cc", fillOpacity:1, color:"#fff", weight:3 });

    document.getElementById("areaDesc").innerHTML =
      `<b>${name}</b> → ${value.toLocaleString()} hektar`;

    let {labels} = chartData[type];

    charts[type].data.datasets[0].pointBackgroundColor =
      labels.map((l,idx)=> idx===i ? "#ff00cc" : "#fff");

    charts[type].update();

    charts["pie"].data.datasets[0].backgroundColor =
      labels.map((l,idx)=> idx===i ? "#ff00cc" : "#2f2f3a");

    charts["pie"].update();

    i++;
    if(i>=layers.length) i=0;

  },2200);
}

function stopAnimation(){
  if(animationInterval){
    clearInterval(animationInterval);
    animationInterval=null;
  }
}

// ======================
// DATA
// ======================
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:f=>{
      let name=f.properties.name;
      stateColors[name]=randomColor();
      opacityMap[name]=0.5;
      return { fillColor:stateColors[name], fillOpacity:0.5, color:"#222", weight:1 };
    },
    onEachFeature:(f,l)=>{ layerMap[f.properties.name]=l; }
  }).addTo(map);

  buildAnalysisUI(data);

  let container=document.getElementById("list");

  data.features.forEach(f=>{
    let name=f.properties.name;

    let div=document.createElement("div");
    div.className="item";

    let label=document.createElement("span");
    label.innerText=name;
    label.onclick=()=> map.fitBounds(layerMap[name].getBounds());

    let slider=document.createElement("input");
    slider.type="range"; slider.min=0.1; slider.max=1; slider.step=0.1; slider.value=0.5;

    let color=document.createElement("input");
    color.type="color"; color.value=stateColors[name];

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({ fillOpacity:slider.value });
    };

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({ fillColor:color.value });
    };

    div.append(label, slider, color);
    container.appendChild(div);
  });

  map.fitBounds(geoLayer.getBounds());
});

</script>
</body>
</html>
