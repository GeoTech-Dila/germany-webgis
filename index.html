<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body { margin:0; display:flex; font-family:Segoe UI; }

/* HEADER */
#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

/* SIDEBAR */
#sidebar {
  width:320px; margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f; padding:15px; color:white;
  overflow:auto;
}

/* MAP */
#map {
  flex:1; margin-top:60px;
  height:calc(100vh - 60px);
}

/* TABS */
.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

/* GRID */
.item {
  display:grid;
  grid-template-columns: 30px 140px 40px 1fr;
  align-items:center;
  gap:10px;
  padding:10px;
  margin:6px 0;
  background:#2a2a40;
  border-radius:8px;
}

.eye { text-align:center; cursor:pointer; }

input[type="color"] {
  width:32px; height:32px;
  border:2px solid #555;
  border-radius:6px;
  cursor:pointer;
}

input[type="range"] {
  width:100%;
  accent-color:#bb00ff;
}

.legend { margin-top:10px; font-size:12px; }

</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">

<div>
  <button class="tab active" onclick="switchTab('layers')">Layers</button>
  <button class="tab" onclick="switchTab('analysis')">Analysis</button>
</div>

<div id="layersTab">
  <div id="list"></div>
</div>

<div id="analysisTab" style="display:none;">
<select id="analysisType">
  <option value="area">Alan (hektar)</option>
</select>
<div id="legend" class="legend"></div>
</div>

</div>

<div id="map"></div>

<script>

let currentMode = "layers";
let animationInterval = null;

function switchTab(tab){

  document.getElementById("layersTab").style.display="none";
  document.getElementById("analysisTab").style.display="none";
  document.getElementById(tab+"Tab").style.display="block";

  currentMode = tab;

  if(tab === "layers"){
    stopAnimation();
    resetLayerStyle();
  }

  if(tab === "analysis"){
    startGlowAnimation();
  }
}

// MAP
var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer;
let layerMap = {};
let stateColors = {};
let opacityMap = {};

// RESET STYLE
function resetLayerStyle(){
  geoLayer.eachLayer(l=>{
    let name = l.feature.properties.name;

    l.setStyle({
      fillColor: stateColors[name] || "#666",
      fillOpacity: opacityMap[name] || 0.7,
      color:"#222",
      weight:1
    });
  });
}

// 🌟 GLOW ANİMASYON
function startGlowAnimation(){

  if(animationInterval) clearInterval(animationInterval);

  let layers = [];

  geoLayer.eachLayer(l=>{
    layers.push(l);
  });

  layers.sort((a,b)=>{
    return (a.feature.properties.area_ha || 0) - (b.feature.properties.area_ha || 0);
  });

  let i = 0;

  animationInterval = setInterval(()=>{

    resetLayerStyle();

    let layer = layers[i];

    // ✨ GLOW EFEKT
    layer.setStyle({
      color: "#ffffff",
      weight: 5,
      fillColor: "#ff00cc",
      fillOpacity: 1,
      opacity: 1
    });

    // 🔥 hafif zoom efekti
    map.fitBounds(layer.getBounds(), {padding:[80,80]});

    i++;
    if(i >= layers.length) i = 0;

  }, 1400); // yavaş animasyon

}

// STOP
function stopAnimation(){
  if(animationInterval){
    clearInterval(animationInterval);
    animationInterval = null;
  }
}

// DATA
fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer = L.geoJSON(data,{
    style:f=>({
      fillColor:"#666",
      color:"#222",
      fillOpacity:0.7
    }),
    onEachFeature:(f,l)=>{
      layerMap[f.properties.name]=l;
    }
  }).addTo(map);

  let container=document.getElementById("list");

  data.features.forEach(f=>{

    let name=f.properties.name;
    stateColors[name]="#ff0000";
    opacityMap[name]=0.7;

    let div=document.createElement("div");
    div.className="item";

    let eye=document.createElement("span");
    eye.innerText="👁️";

    let visible=true;

    eye.onclick=(e)=>{
      e.stopPropagation();
      let layer=layerMap[name];

      if(visible){
        map.removeLayer(layer);
        eye.innerText="🚫";
      } else {
        map.addLayer(layer);
        eye.innerText="👁️";
      }
      visible=!visible;
    };

    let label=document.createElement("span");
    label.innerText=name;

    label.onclick=()=>{
      let layer = layerMap[name];

      map.fitBounds(layer.getBounds(),{padding:[50,50]});

      layer.bindPopup(`
        <b>${name}</b><br>
        🌍 Alan: ${
          layer.feature.properties.area_ha
          ? layer.feature.properties.area_ha.toLocaleString()+" ha"
          : "bilgi yok"
        }
      `).openPopup();
    };

    let color=document.createElement("input");
    color.type="color";

    let slider=document.createElement("input");
    slider.type="range";
    slider.min=0.1; slider.max=1; slider.step=0.1;
    slider.value=0.7;

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({
        fillColor:color.value,
        fillOpacity:opacityMap[name]
      });
    };

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({
        fillColor:stateColors[name],
        fillOpacity:slider.value
      });
    };

    div.appendChild(eye);
    div.appendChild(label);
    div.appendChild(color);
    div.appendChild(slider);

    container.appendChild(div);

  });

  map.fitBounds(geoLayer.getBounds());

});
</script>

</body>
</html>
