<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Germany WebGIS Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; display:flex; font-family:Segoe UI; }

#header {
  position:fixed; top:0; width:100%; height:60px;
  background:#121222; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

#sidebar {
  width:320px; margin-top:60px;
  height:calc(100vh - 60px);
  background:#1e1e2f; padding:15px; color:white;
  overflow:auto;
}

#map {
  flex:1; margin-top:60px;
  height:calc(100vh - 60px);
}

.tab { padding:8px; margin:3px; cursor:pointer; background:#2a2a40; }
.tab.active { background:#00ffff; color:black; }

.item {
  display:grid;
  grid-template-columns: 30px 140px 40px 1fr;
  align-items:center;
  gap:10px;
  padding:10px;
  margin:6px 0;
  background:#2a2a40;
  border-radius:8px;
}

input[type="range"] { accent-color:#bb00ff; }

canvas { margin-top:10px; }
</style>
</head>

<body>

<div id="header">
  <div>🌍 GeoTech Dila</div>
  <div>WebGIS Dashboard</div>
</div>

<div id="sidebar">

<button class="tab" onclick="switchTab('layers')">Layers</button>
<button class="tab" onclick="switchTab('analysis')">Analysis</button>

<div id="layersTab">
  <div id="list"></div>
</div>

<div id="analysisTab" style="display:none;">
  <canvas id="chart"></canvas>
</div>

</div>

<div id="map"></div>

<script>

let currentMode = "layers";
let animationInterval = null;
let chart, chartLabels=[], chartData=[];

function switchTab(tab){

  document.getElementById("layersTab").style.display="none";
  document.getElementById("analysisTab").style.display="none";
  document.getElementById(tab+"Tab").style.display="block";

  currentMode = tab;

  if(tab==="layers"){
    stopAnimation();
    resetLayerStyle();
  }

  if(tab==="analysis"){
    startGlowAnimation();
  }
}

var map = L.map('map').setView([51,10],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, layerMap={}, stateColors={}, opacityMap={};

function resetLayerStyle(){
  geoLayer.eachLayer(l=>{
    let n=l.feature.properties.name;
    l.setStyle({
      fillColor: stateColors[n] || "#666",
      fillOpacity: opacityMap[n] || 0.7,
      color:"#222"
    });
  });
}

function createChart(){
  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:chartLabels,
      datasets:[{
        data:chartData,
        borderColor:"#ff00cc",
        backgroundColor:"rgba(255,0,204,0.2)",
        tension:0.4,
        pointRadius:4
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      animation:{duration:1000}
    }
  });
}

function startGlowAnimation(){

  if(animationInterval) clearInterval(animationInterval);

  let layers=[];
  geoLayer.eachLayer(l=>layers.push(l));

  layers.sort((a,b)=>a.feature.properties.area_ha - b.feature.properties.area_ha);

  let i=0;

  animationInterval=setInterval(()=>{

    resetLayerStyle();

    let layer=layers[i];
    let name=layer.feature.properties.name;
    let area=layer.feature.properties.area_ha || 0;

    layer.setStyle({
      color:"#fff",
      weight:4,
      fillColor:"#ff00cc",
      fillOpacity:1
    });

    layer.bindPopup(`<b>${name}</b><br>${area.toLocaleString()} ha`).openPopup();

    // GRAPH SYNC
    chart.data.datasets[0].pointBackgroundColor =
      chartLabels.map((l,idx)=> idx===i ? "#ff00cc" : "#fff");

    chart.update();

    i++;
    if(i>=layers.length) i=0;

  },1500);
}

function stopAnimation(){
  if(animationInterval){
    clearInterval(animationInterval);
    animationInterval=null;
  }
}

fetch("https://germany-webgis-1.onrender.com/states")
.then(r=>r.json())
.then(data=>{

  geoLayer=L.geoJSON(data,{
    style:{fillColor:"#666",fillOpacity:0.7,color:"#222"},
    onEachFeature:(f,l)=>layerMap[f.properties.name]=l
  }).addTo(map);

  let sorted=[...data.features].sort((a,b)=>a.properties.area_ha-b.properties.area_ha);

  sorted.forEach(f=>{
    chartLabels.push(f.properties.name);
    chartData.push(f.properties.area_ha||0);
  });

  createChart();

  let container=document.getElementById("list");

  data.features.forEach(f=>{

    let name=f.properties.name;
    stateColors[name]="#ff0000";
    opacityMap[name]=0.7;

    let div=document.createElement("div");
    div.className="item";

    let eye=document.createElement("span");
    eye.innerText="👁️";

    let visible=true;
    eye.onclick=e=>{
      e.stopPropagation();
      visible?map.removeLayer(layerMap[name]):map.addLayer(layerMap[name]);
      eye.innerText=visible?"🚫":"👁️";
      visible=!visible;
    };

    let label=document.createElement("span");
    label.innerText=name;

    label.onclick=()=>{
      let l=layerMap[name];
      map.fitBounds(l.getBounds());
      l.bindPopup(`<b>${name}</b><br>${f.properties.area_ha} ha`).openPopup();
    };

    let color=document.createElement("input");
    color.type="color";

    let slider=document.createElement("input");
    slider.type="range";
    slider.min=0.1; slider.max=1; slider.step=0.1;
    slider.value=0.7;

    color.oninput=()=>{
      stateColors[name]=color.value;
      layerMap[name].setStyle({fillColor:color.value});
    };

    slider.oninput=()=>{
      opacityMap[name]=slider.value;
      layerMap[name].setStyle({fillOpacity:slider.value});
    };

    div.append(eye,label,color,slider);
    container.appendChild(div);

  });

  map.fitBounds(geoLayer.getBounds());

});

</script>

</body>
</html>
